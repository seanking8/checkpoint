spring:
  datasource:
    url: jdbc:h2:mem:checkpoint_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: always

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration-ms: 86400000

app:
  test-seed:
    enabled: true
    user:
      username: ${TEST_USER_USERNAME:test_user}
      password: ${TEST_USER_PASSWORD:test_user_password}
    admin:
      username: ${TEST_ADMIN_USERNAME:test_admin}
      password: ${TEST_ADMIN_PASSWORD:test_admin_password}

