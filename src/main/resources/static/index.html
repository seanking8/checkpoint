<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkpoint</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- AUTH VIEW -->
<div id="view-auth" class="d-none min-vh-100 bg-dark d-flex align-items-center justify-content-center">
    <div class="card shadow-lg" style="width:100%;max-width:440px;">
        <div class="card-body p-4">

            <h2 class="text-center fw-bold mb-1">&#127918; Checkpoint</h2>
            <p class="text-center text-muted mb-4">Your gaming backlog manager</p>

            <div id="authAlert" class="alert d-none" role="alert"></div>

            <ul class="nav nav-tabs mb-3">
                <li class="nav-item w-50">
                    <button class="nav-link active w-100" id="loginTabBtn" onclick="App.showAuthTab('login')">Login</button>
                </li>
                <li class="nav-item w-50">
                    <button class="nav-link w-100" id="registerTabBtn" onclick="App.showAuthTab('register')">Register</button>
                </li>
            </ul>

            <!-- Login form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="loginUsername" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <!-- Register form (hidden initially) -->
            <form id="registerForm" class="d-none">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="regUsername" placeholder="Choose a username" minlength="3" maxlength="50" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" placeholder="Min 6 characters" minlength="6" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="regConfirmPassword" placeholder="Repeat your password" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Create Account</button>
            </form>

        </div>
    </div>
</div>

<!-- APP SHELL -->
<div id="view-app" class="d-none">
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand fw-bold">&#127918; Checkpoint</span>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white small" id="navUsername"></span>
            <span class="btn btn-sm btn-outline-warning d-none" id="adminNav">&#9881; Admin</span>
            <button class="btn btn-sm btn-outline-danger" onclick="App.logout()">Logout</button>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0">My Backlog</h3>
            <span class="badge text-bg-secondary" id="backlogCount">0 items</span>
        </div>

        <div id="backlogAlert" class="alert d-none" role="alert"></div>

        <div id="backlogLoading" class="card p-4 text-center text-muted">Loading your backlog...</div>

        <div id="backlogEmpty" class="card p-4 text-center d-none">
            <h5 class="mb-2">No backlog items yet</h5>
            <p class="text-muted mb-0">Once you add games, they will appear here.</p>
        </div>

        <div id="backlogTableWrap" class="card d-none">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="backlogTable">
                    <thead class="table-light">
                    <tr>
                        <th>Game</th>
                        <th>Platform</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="backlogTableBody"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>
<script src="app.js"></script>
</body>
</html>
