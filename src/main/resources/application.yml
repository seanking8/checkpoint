spring:
  application:
    name: checkpoint

  datasource:
    # MySQL Connection Settings
    url: jdbc:mysql://localhost:3307/checkpoint?allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    # JPA/Hibernate Settings
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          batch_size: 1000
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  # Load local development values from an ignored file.
  # config:
  #   import: optional:classpath:application.dev.properties

# adjusted server port to avoid conflicts with other applications
server:
  port: 8081

# Logging Configuration
